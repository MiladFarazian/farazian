<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        background: #05070c;
        color: #e8f0ff;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        overflow: hidden;
      }
      h1 { font-size: 1rem; letter-spacing: 0.28em; text-transform: uppercase; color: #2af5ff; }
      .hud { display: flex; gap: 28px; font-size: 0.78rem; color: #8aa0c0; }
      .hud b { color: #e8f0ff; font-weight: 500; }
      #gameCanvas {
        background: #000;
        border: 1px solid rgba(110, 150, 220, 0.2);
        border-radius: 10px;
        height: min(500px, 62vmin);
        width: auto;
        aspect-ratio: 1;
        touch-action: none;
      }
      .controls { display: flex; gap: 8px; }
      .hint {
        font-size: 0.62rem;
        letter-spacing: 0.03em;
        color: #6b7a8c;
        text-align: center;
        max-width: 92%;
      }
      .hint b { color: #2af5ff; font-weight: 500; }
      .dpad { display: none; flex-direction: column; align-items: center; gap: 6px; }
      .dpad__row { display: flex; gap: 6px; }
      .dpad button {
        width: 46px;
        height: 40px;
        font-size: 0.95rem;
        color: #2af5ff;
        background: rgba(42, 245, 255, 0.07);
        border: 1px solid rgba(42, 245, 255, 0.35);
        border-radius: 10px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
      }
      .dpad button:active { background: rgba(42, 245, 255, 0.2); }
      @media (hover: none) {
        .dpad { display: flex; }
      }
      button {
        font-family: inherit;
        font-size: 0.72rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #04060a;
        background: linear-gradient(100deg, #2af5ff, #b06bff);
        border: none;
        border-radius: 999px;
        padding: 0.55em 1.1em;
        cursor: pointer;
      }
      #pauseButton, #restartButton { color: #2af5ff; background: none; border: 1px solid rgba(42, 245, 255, 0.4); }
    </style>
  </head>
  <body>
    <h1>Snake</h1>
    <div class="hud"><span>Score <b id="score">0</b></span><span>High <b id="highScore">0</b></span></div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <div class="controls">
      <button id="startButton">Start</button>
      <button id="pauseButton">Pause</button>
      <button id="restartButton">Restart</button>
    </div>
    <p class="hint">Click the board · <b>Arrow keys / WASD</b> to move · <b>Space</b> to pause · swipe on mobile</p>
    <div class="dpad" aria-label="Direction pad">
      <button data-dir="up" aria-label="Up">▲</button>
      <div class="dpad__row">
        <button data-dir="left" aria-label="Left">◀</button>
        <button data-dir="down" aria-label="Down">▼</button>
        <button data-dir="right" aria-label="Right">▶</button>
      </div>
    </div>
    <script src="snake.js"></script>
  </body>
</html>
