<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KATSUYA'S REVENGE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
#container {
  position: relative; width: 1600px; height: 800px;
  transform-origin: center center;
}
canvas { display: block; cursor: crosshair; }
.btn {
  position: absolute; font: bold 22px 'Segoe UI', sans-serif; color: #fff;
  background: rgba(40,40,60,0.85); border: 2px solid rgba(200,170,50,0.6);
  cursor: pointer; text-align: center; padding: 0;
}
.btn:hover { background: rgba(60,60,90,0.95); border-color: rgba(200,170,50,0.9); }
#nextBtn   { right: 80px; bottom: 75px; width: 320px; height: 75px; font-size: 28px; }
#pauseBtn  { left: 30px; bottom: 50px; width: 36px; height: 36px; font-size: 18px; display: none; }
#resumeBtn { left: 285px; bottom: 50px; width: 100px; height: 36px; display: none; }
#restartBtn{ left: 285px; bottom: 95px; width: 100px; height: 36px; display: none; }
#quitBtn   { left: 285px; bottom: 140px; width: 100px; height: 36px; display: none; }
#loading   { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
             color: #c8aa32; font: 24px serif; }
/* Desktop controls hint (hidden on touch, which gets the on-screen pad). */
#ctrlHint {
  position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
  font: 12px 'Segoe UI', sans-serif; letter-spacing: 0.04em; color: #7d8aa0;
  white-space: nowrap; pointer-events: none; z-index: 20;
}
#ctrlHint b { color: #c8aa32; font-weight: 600; }
/* On-screen movement pad for touch devices. */
.touch-pad {
  position: fixed; left: 0; right: 0; bottom: 12px; z-index: 20;
  display: none; justify-content: space-between; align-items: flex-end;
  padding: 0 14px; pointer-events: none;
}
.touch-pad > * { pointer-events: auto; }
.touch-pad__move { display: flex; gap: 12px; }
.touch-pad button {
  font: bold 20px 'Segoe UI', sans-serif; color: #fff;
  background: rgba(40,40,60,0.7); border: 2px solid rgba(200,170,50,0.6);
  border-radius: 14px; padding: 16px 22px; min-width: 66px;
  user-select: none; -webkit-user-select: none; touch-action: none;
}
.touch-pad button:active { background: rgba(200,170,50,0.35); }
@media (hover: none) {
  #ctrlHint { display: none; }
  .touch-pad { display: flex; }
}
</style>
</head>
<body>
<div id="container">
  <canvas id="c" width="1600" height="800"></canvas>
  <div id="loading">Loading assets...</div>
  <button class="btn" id="nextBtn">Next</button>
  <button class="btn" id="pauseBtn">||</button>
  <button class="btn" id="resumeBtn">Resume</button>
  <button class="btn" id="restartBtn">Restart</button>
  <button class="btn" id="quitBtn" style="display:none">Quit</button>
</div>
<div id="ctrlHint"><b>A / D</b> or <b>← →</b> move · <b>Space</b> jump · <b>click</b> to shoot</div>
<div class="touch-pad" aria-hidden="true">
  <div class="touch-pad__move">
    <button id="leftBtn" aria-label="Move left">◀</button>
    <button id="rightBtn" aria-label="Move right">▶</button>
  </div>
  <button id="jumpBtn" aria-label="Jump">JUMP</button>
</div>
<script src="game.js"></script>
</body>
</html>
